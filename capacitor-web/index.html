<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lobo Guara</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        width: min(92vw, 520px);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.8);
        padding: 20px;
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        opacity: 0.9;
        line-height: 1.5;
      }
      code {
        font-size: 0.92em;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Lobo Guara</h1>
      <p>
        Configure <code>CAPACITOR_APP_URL</code> para abrir a versão hospedada no Render e execute
        <code>npm run cap:sync</code> novamente.
      </p>
    </section>
  </body>
</html>
